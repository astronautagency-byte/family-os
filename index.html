  <body>
    <div id="root">
      <div id="app-loading">
        <style>
          #app-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            font-family: Inter, Arial, sans-serif;
            background: #fdfcfa;
          }
          #app-loading img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 16px;
            background: #fff5e9;
            padding: 5px;
            box-shadow: 0 4px 12px rgba(23,23,31,.06);
            margin-bottom: 18px;
          }
          #app-loading strong {
            font-size: 22px;
            letter-spacing: -.06em;
            color: #17172f;
          }
          #app-loading strong span { color: #7952e8; }
          #app-loading .load-spinner {
            width: 20px;
            height: 20px;
            margin-top: 22px;
            border: 2px solid #e5e0f2;
            border-top-color: #7952e8;
            border-radius: 50%;
            animation: loadSpin .8s linear infinite;
          }
          @keyframes loadSpin {
            to { transform: rotate(360deg); }
          }
          @media (prefers-reduced-motion: reduce) {
            #app-loading .load-spinner { animation: none; opacity: .35; }
          }
        </style>
        <img src="/brand/famos-icon-transparent.png" alt="" width="60" height="60" />
        <strong>Fam<span>OS</span></strong>
        <div class="load-spinner" aria-hidden="true"></div>
      </div>
    </div>
